apiVersion: v1
kind: Pod
metadata:
  name: {{ include "babelsuite.fullname" . }}-test-connection
  labels:
    {{- include "babelsuite.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: healthz
      image: curlimages/curl:8.7.1
      command:
        - sh
        - -c
        - |
          curl -sf http://{{ include "babelsuite.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/healthz
          curl -sf http://{{ include "babelsuite.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/readyz
