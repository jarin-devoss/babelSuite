name: Local Debug
description: Relaxed SOAP timeouts, verbose envelope logging, legacy adapter enabled.
default: true

network:
  mode: execution

env:
  LOG_LEVEL: debug
  CLAIM_TYPES: medical,dental,vision,pharmacy
  LEGACY_MODE: "true"

services:
  soap-adapter:
    env:
      ENVELOPE_LOGGING: verbose
      TIMEOUT_MS: "5000"
  claims-api:
    env:
      VALIDATION_LEVEL: relaxed
