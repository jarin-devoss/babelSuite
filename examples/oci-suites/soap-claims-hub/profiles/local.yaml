name: Local Debug
description: Relaxed SOAP timeouts with verbose envelope logging.
default: true
runtime:
  suite: soap-claims-hub
  repository: localhost:5000/enterprise-integration/soap-claims-hub
  profileFile: local.yaml
modules:
    - runtime
observability:
  logs: structured
  traces: enabled
  metrics: enabled
env:
  CLAIM_TYPES: medical,dental,vision,pharmacy
  LEGACY_MODE: "true"
  ENABLE_ADAPTER: "true"
  VALIDATION_LEVEL: strict
  SOAP_VERSIONS: "1.1,1.2"
