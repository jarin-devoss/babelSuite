name: Canary Partner
description: Partner-like SOAP headers and stricter claim review toggles.
default: false
runtime:
  suite: soap-claims-hub
  repository: localhost:5000/enterprise-integration/soap-claims-hub
  profileFile: canary.yaml
modules:
    - runtime
observability:
  logs: structured
  traces: enabled
  metrics: enabled
env:
  CLAIM_TYPES: medical,dental,vision,pharmacy
  LEGACY_MODE: "false"
  ENABLE_ADAPTER: "true"
  VALIDATION_LEVEL: strict
  SOAP_VERSIONS: "1.2"
