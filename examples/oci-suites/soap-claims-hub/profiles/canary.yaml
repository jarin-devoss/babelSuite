name: Canary Partner
description: New SOAP 1.2 path, strict validation, no legacy adapter.
default: false

network:
  mode: execution

env:
  LOG_LEVEL: info
  CLAIM_TYPES: medical,dental,vision,pharmacy
  LEGACY_MODE: "false"

services:
  claims-api:
    env:
      VALIDATION_LEVEL: strict
      REVIEW_ESCALATION: enabled
      SOAP_VERSION: "1.2"
