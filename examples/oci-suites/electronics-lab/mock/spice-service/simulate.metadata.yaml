apiVersion: mocks.babelsuite.io/v1alpha1
kind: MockOperation
metadata:
    metadataPath: mock/spice-service/simulate.metadata.yaml
    operationId: spice-simulate
    sourceArtifact: mock/spice-service/simulate.cue
    suite: electronics-lab
spec:
    adapter: rest
    delayMillis: 80
    fallback:
        mode: static
        examplename: ""
        proxyurl: ""
        status: "422"
        mediatype: application/json
        body: |-
            {
              "code": "UNKNOWN_SCENARIO",
              "message": "No spice-sim mock matched. Use ?scenario=pass or ?scenario=fail."
            }
        headers: []
    parameterConstraints:
        - name: scenario
          source: query
          required: true
          forward: false
          pattern: ^(pass|fail)$
        - name: content-type
          source: header
          required: true
          forward: false
          pattern: (?i)^application/json
    resolverUrl: /internal/mock-data/electronics-lab/spice-service/spice-simulate
    runtimeUrl: /mocks/rest/electronics-lab/spice-service/simulate?scenario=pass
    state:
        lookupkeytemplate: ""
        mutationkeytemplate: ""
        defaults: {}
        transitions: []
