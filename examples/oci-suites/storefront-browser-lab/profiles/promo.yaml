name: Promo Burst
description: All browsers, promo fixtures, GPU-accelerated catalog seeding.
default: false

network:
  mode: execution

env:
  LOG_LEVEL: info
  BROWSERS: chromium,firefox,webkit

services:
  seed-products:
    devices: ["gpu"]
  storefront:
    env:
      API_PORT: 3000
      PROMO_MODE: enabled
      DISCOUNT_CAP: "50"
