name: Local Debug
description: Single browser, verbose traces, demo-seeded catalog.
default: true

network:
  mode: execution

env:
  LOG_LEVEL: debug
  BROWSERS: chromium

services:
  storefront:
    env:
      API_PORT: 13000
      FEATURE_FLAGS: new_checkout=true
  catalog-mock:
    env:
      RESPONSE_DELAY_MS: "100"
