name: Local Debug
description: Verbose logs, permissive fraud, execution network.
default: true

network:
  mode: execution

env:
  LOG_LEVEL: debug
  REFUND_MODES: instant,delayed,manual
  ENABLE_FRAUD_SCREENING: "true"

services:
  returns-api:
    env:
      API_PORT: 18085
  fraud-worker:
    env:
      DECISION_MODE: permissive
