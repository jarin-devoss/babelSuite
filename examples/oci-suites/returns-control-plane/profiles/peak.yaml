name: Peak Season
description: High-volume refund traffic with GPU-accelerated policy seeding.
default: false

network:
  mode: execution

env:
  LOG_LEVEL: info
  REFUND_MODES: instant,delayed,manual,disputed
  ENABLE_FRAUD_SCREENING: "true"

# seed-policies gets a GPU in peak runs — policy graph is large
services:
  seed-policies:
    devices: ["gpu"]
  returns-api:
    env:
      API_PORT: 8085
      MAX_CONCURRENT_REFUNDS: "500"
  fraud-worker:
    env:
      DECISION_MODE: strict
      WORKER_THREADS: "8"
