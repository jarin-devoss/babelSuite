name: Canary Routing
description: Canary refund rules with manual-review escalation and delayed callbacks.
default: false

network:
  mode: execution

env:
  LOG_LEVEL: info
  REFUND_MODES: instant,delayed,manual
  ENABLE_FRAUD_SCREENING: "false"

services:
  returns-api:
    env:
      API_PORT: 8085
      CANARY_RULES: "true"
      ESCALATION_MODE: manual-review
