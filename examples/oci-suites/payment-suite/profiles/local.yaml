extendsId: base
name: Local Debug
description: Verbose logs, permissive fraud, local secrets.
default: true

env:
  LOG_LEVEL: debug
  FRAUD_STRATEGY: permissive

secretRefs:
  - key: STRIPE_API_KEY
    provider: Local Secret
    ref: secrets://developer/stripe-api-key

services:
  payment-gateway:
    env:
      API_PORT: 18080
      CHECKOUT_MODE: local-debug
  fraud-worker-0:
    env:
      WORKER_REPLICA_COUNT: "1"
