extendsId: base
name: Staging
description: Production-like topology with execution network and Vault secrets.
default: false

# network.mode: execution — containers reach each other by name
# (payment-gateway, db, stripe-mock all on the same bridge)
network:
  mode: execution

env:
  LOG_LEVEL: info
  FRAUD_STRATEGY: strict
  FRAUD_REPLICAS: "3"

secretRefs:
  - key: DB_PASSWORD
    provider: Vault
    ref: kv/payment-suite/staging-db-password

services:
  payment-gateway:
    env:
      API_PORT: 8080
      ROUTING_MODE: staging
  fraud-worker-0:
    env:
      DECISION_MODE: strict
