extendsId: base
name: Year-End
description: Ledger rollover fixtures and year-end settlement edge cases.
default: false

network:
  mode: execution

env:
  LEDGER_PERIOD: year_end
  FRAUD_STRATEGY: settlement_review
  TRAFFIC_PROFILE: stress

secretRefs:
  - key: SETTLEMENT_SFTP_KEY
    provider: Vault
    ref: kv/payment-suite/year-end-sftp-key

services:
  payment-gateway:
    env:
      SETTLEMENT_BATCH_SIZE: "500"
  fraud-worker-0:
    env:
      REPLAY_HISTORICAL_CHARGES: "true"
      LEDGER_CLOSE_MODE: year-end
