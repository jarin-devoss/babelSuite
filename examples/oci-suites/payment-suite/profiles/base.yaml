name: Base Runtime
description: Canonical defaults shared by every profile via extendsId.
default: false

env:
  LOG_LEVEL: info
  FRAUD_STRATEGY: standard
  TRAFFIC_PROFILE: baseline

secretRefs:
  - key: JWT_PRIVATE_KEY
    provider: Local Secret
    ref: secrets://developer/jwt-private-key

services:
  payment-gateway:
    env:
      POSTGRES_URL: postgres://test:test@db:5432/payments
  stripe-mock:
    env:
      RESPONSE_DELAY_MS: "0"
