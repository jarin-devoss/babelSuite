name: CI Smoke
description: Fast login assertions with deterministic realms, no TLS.
default: false

env:
  LOG_LEVEL: warn
  REALM_ENV: ci
  SESSION_TTL_SECONDS: "300"

secretRefs:
  - key: JWT_SIGNING_KEY
    provider: Local Secret
    ref: secrets://ci/jwt-signing-key

services:
  broker-api:
    env:
      API_PORT: 9000
      TLS_ENABLED: "false"
