name: Local Debug
description: Single region, verbose telemetry, browser-forwarded ports.
default: true

network:
  mode: execution

env:
  LOG_LEVEL: debug
  REGIONS: eu-west
  ENABLE_TELEMETRY: "true"
  ENABLE_GEO_FENCE: "true"
  SPIKE_MULTIPLIER: "2"

services:
  control-room:
    env:
      API_PORT: 13000
